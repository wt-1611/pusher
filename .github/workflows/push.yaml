name: sync docker
on: push


env:
  USER: "${{ secrets.ALIYUNUSER }}"
  PASS: "${{ secrets.ALIYUNPASS}}"
  REGISTRY: "${{ secrets.ALIYUNREGISTRY }}"
  NAMESPACE: "${{ secrets.ALIYUNNAMESPACE }}"

jobs:
  pushtodocker:
    name: push
    runs-on: ubuntu-latest
    steps:
    - name: Read warehouse configuration
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: pull and push
      run: |
        
        docker login -u $USER -p $PASS $REGISTRY
        for line in $(cat image.txt); do
          echo $line
            if [ ! -z $line ];then
              echo "############download image:${line}############"
              docker pull $line && echo "download success" || exit 12
              
              eval $(echo $line | awk -F'/' '{print $NF}'|awk -F':' '{print "IMAGE="$1,"TAG="$2}')
              
              echo "use image: ${IMAGE}:${TAG}"

              DEST="${REGISTRY}/${NAMESPACE}/${IMAGE}:${TAG}"

              echo "############modify the image tag############"
              docker tag $line $DEST && echo "modify success" || exit 12

              echo "############push images to aliyun############"
              docker push $DEST && echo "push success" || exit 12
            fi
        done
        
